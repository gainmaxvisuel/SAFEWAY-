<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrait</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
background:#0a0a0a;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:420px;
padding:20px;
position:relative;
}

.back-btn{
position:absolute;
top:10px;
left:10px;
font-size:24px;
cursor:pointer;
}

h2{
text-align:center;
color:#ff0000;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #222;
background:#111;
color:#fff;
outline:none;
}

.dropdown-btn{
margin-top:10px;
padding:14px;
background:#111;
border:1px solid #222;
border-radius:10px;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.dropdown-list{
display:none;
background:#111;
border:1px solid #222;
border-radius:10px;
margin-top:5px;
}

.item, .operator-item{
padding:12px;
border-bottom:1px solid #222;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
}

.operator-item img{
width:28px;
height:28px;
border-radius:50%;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:10px;
background:#ff0000;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.error{
color:red;
text-align:center;
margin-top:10px;
}

/* 🔥 résumé pro */
.info{
margin-top:15px;
padding:12px;
border-radius:10px;
background:#111;
border:1px solid #222;
line-height:1.6;
display:none;
}
</style>
</head>

<body>

<div class="container">

<div class="back-btn" onclick="goBack()">←</div>

<h2>💸 Retrait</h2>

<!-- PAYS -->
<div class="dropdown-btn" onclick="toggleCountries()">
<span id="countryText">Choisir pays</span>
<span>▼</span>
</div>

<div class="dropdown-list" id="countryList">
<div class="item" onclick="setCountry('+226')">🇧🇫 Burkina Faso</div>
<div class="item" onclick="setCountry('+225')">🇨🇮 Côte d'Ivoire</div>
<div class="item" onclick="setCountry('+223')">🇲🇱 Mali</div>
<div class="item" onclick="setCountry('+227')">🇳🇪 Niger</div>
<div class="item" onclick="setCountry('+228')">🇹🇬 Togo</div>
<div class="item" onclick="setCountry('+229')">🇧🇯 Bénin</div>
<div class="item" onclick="setCountry('+237')">🇨🇲 Cameroun</div>
<div class="item" onclick="setCountry('+221')">🇸🇳 Sénégal</div>
</div>

<!-- OPERATEURS -->
<div class="dropdown-btn" onclick="showOperators()">
<span id="operatorText">Choisir opérateur</span>
<span>▼</span>
</div>

<div class="dropdown-list" id="operatorList"></div>

<input id="phone" placeholder="Numéro">
<input id="amount" placeholder="Montant">

<!-- 🔥 AJOUT PRO -->
<div class="info" id="feeInfo"></div>

<div class="error" id="error"></div>

<button onclick="sendWithdrawal()">Valider retrait</button>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://ycswpdydsgoqplkqtpsd.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljc3dwZHlkc2dvcXBsa3F0cHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjY4MTcsImV4cCI6MjA5MDU0MjgxN30.67bBMdHtcGFIJuZuY_Xd4hBN4hj86JjHVXGN3oPbKMA"
);

let countryCode = "";
let selectedOperator = "";

const FEE_RATE = 0.07;

/* OPERATEURS */
const operators = [
{name:"Orange Money", logo:"orange.png"},
{name:"MTN Mobile Money", logo:"mtn.png"},
{name:"Moov Money", logo:"moov.png"},
{name:"Wave", logo:"wave.png"},
{name:"Telecel Money", logo:"telecel.png"}
];

function goBack(){
window.location.href="wallet.html";
}

function toggleCountries(){
let el = document.getElementById("countryList");
el.style.display = el.style.display === "block" ? "none":"block";
}

function setCountry(code){
countryCode = code;
document.getElementById("countryText").innerText = code;
document.getElementById("countryList").style.display = "none";
}

function showOperators(){
let list = document.getElementById("operatorList");
list.innerHTML = "";

operators.forEach(op=>{
let div = document.createElement("div");
div.className = "operator-item";

div.innerHTML = `
<img src="${op.logo}">
<span>${op.name}</span>
`;

div.onclick = ()=>{
selectedOperator = op.name;
document.getElementById("operatorText").innerText = op.name;
list.style.display = "none";
};

list.appendChild(div);
});

list.style.display = "block";
}

/* 🔥 AFFICHAGE FRAIS PRO */
document.getElementById("amount").addEventListener("input", () => {

let amountInput = document.getElementById("amount");
let feeInfo = document.getElementById("feeInfo");

let amount = parseFloat(amountInput.value);

if(!amountInput.value || isNaN(amount) || amount <= 0){
feeInfo.style.display = "none";
return;
}

let fee = amount * FEE_RATE;
let receive = amount - fee;

feeInfo.style.display = "block";

feeInfo.innerHTML = `
💰 <b>Résumé du retrait</b><br><br>
Montant : <b>${amount.toFixed(0)}</b><br>
Frais (7%) : <b>${fee.toFixed(2)}</b><br>
À recevoir : <b>${receive.toFixed(2)}</b>
`;
});

async function sendWithdrawal(){

let user_id = localStorage.getItem("user_id");
let phone = document.getElementById("phone").value;
let amount = document.getElementById("amount").value;
let error = document.getElementById("error");

error.innerText = "";

if(!user_id){
error.innerText = "Non connecté";
return;
}

if(!countryCode || !selectedOperator || !phone || !amount){
error.innerText = "Tous les champs sont obligatoires";
return;
}

try{

const { error } = await supabaseClient.rpc("create_withdrawal", {
p_user_id: user_id,
p_full_name: "USER",
p_country_code: countryCode,
p_phone: phone,
p_operator: selectedOperator,
p_amount: parseInt(amount)
});

if(error) throw error;

window.location.href = "transactions.html";

}catch(e){
error.innerText = e.message;
}

}

</script>

</body>
</html>
