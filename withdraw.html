function toggleCountries(){
let el = document.getElementById("countryList");

function setCountry(code){

/* OPERATEURS */
function showOperators(){
let list = document.getElementById("operatorList");
list.innerHTML = "";

operators.forEach(op=>{
let div = document.createElement("div");
div.className = "operator-item";

div.innerHTML = `

selectedOperator = op.name;

`;

list.style.display = "none";
};

list.appendChild(div);
});

list.style.display = "block";
}

/* CALCUL FRAIS */
document.getElementById("amount").addEventListener("input", function(){

let amount = parseInt(this.value);

if(!amount || amount <= 0){
document.getElementById("calcBox").style.display = "none";
return;
}

let fee = Math.floor(amount * 0.07);
let net = amount - fee;

document.getElementById("feeText").innerText = fee + " XOF";
document.getElementById("netText").innerText = net + " XOF";

document.getElementById("calcBox").style.display = "block";

});
