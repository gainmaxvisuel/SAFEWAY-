<script>

async function loadUser(){

let userId = localStorage.getItem("user_id");
if(!userId) return;

const { data } = await client
.from("users")
.select("full_name, phone, country_code")
.eq("id", userId)
.single();

if(data){

document.getElementById("phone").innerText =
data.country_code + " " + data.phone;

document.getElementById("name").innerText =
data.full_name;

let name = data.full_name.toLowerCase();

let femaleNames = [
"mariam","fatou","aicha","aminata","sarah","safia","awa","rose","jeanne","khadija"
];

let avatar = document.getElementById("avatar");

let isFemale = femaleNames.some(n => name.includes(n));

if(isFemale){
avatar.src = "https://randomuser.me/api/portraits/women/44.jpg";
}else{
avatar.src = "https://randomuser.me/api/portraits/men/45.jpg";
}

}

}

function logout(){
localStorage.removeItem("user_id");
location.href = "login.html";
}

loadUser();
